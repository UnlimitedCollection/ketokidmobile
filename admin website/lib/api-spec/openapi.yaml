components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        doctor:
          $ref: "#/components/schemas/Doctor"
        token:
          type: string
      required:
        - doctor
        - token

    Doctor:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: string
        designation:
          type: string
        role:
          type: string
          enum: [admin, moderator]
        mustChangePassword:
          type: boolean
      required:
        - id
        - username
        - name
        - email
        - role

    UpdateDoctorProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        designation:
          type: string
        username:
          type: string
          minLength: 3
          maxLength: 100
      required:
        - name
        - email
        - username

    ForceChangePasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
          minLength: 6
        confirmPassword:
          type: string
          minLength: 1
      required:
        - newPassword
        - confirmPassword

    ChangeDoctorPasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 6
        confirmPassword:
          type: string
          minLength: 1
      required:
        - currentPassword
        - newPassword
        - confirmPassword

    DashboardStats:
      type: object
      properties:
        totalChildren:
          type: integer
        unfilledMealRecords:
          type: integer
        last24hUnfilledMealRecords:
          type: integer
        classicDistribution:
          type: array
          items:
            $ref: "#/components/schemas/ClassicDistributionEntry"
        totalDoctors:
          type: integer
        tokenSummary:
          $ref: "#/components/schemas/TokenSummary"
        classicChildren:
          type: integer
        madChildren:
          type: integer
        mctChildren:
          type: integer
        lowgiChildren:
          type: integer
      required:
        - totalChildren
        - unfilledMealRecords
        - last24hUnfilledMealRecords
        - classicDistribution
        - totalDoctors
        - tokenSummary
        - classicChildren
        - madChildren
        - mctChildren
        - lowgiChildren

    ClassicDistributionEntry:
      type: object
      properties:
        ratio:
          type: string
          enum: ["2:1", "2.5:1", "3:1", "3.5:1", "4:1"]
        count:
          type: integer
        label:
          type: string
      required:
        - ratio
        - count
        - label

    Kid:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        kidCode:
          type: string
          description: Patient Health Number (PHN) in format XXXX-XXXXXX-X (e.g. 0180-498827-2). Unique identifier.
          example: 0180-498827-2
        dateOfBirth:
          type: string
          format: date
        ageMonths:
          type: integer
        dietType:
          type: string
          enum: [classic, mad, mct, lowgi]
        dietSubCategory:
          type: string
          enum: ["2:1", "2.5:1", "3:1", "3.5:1", "4:1"]
          nullable: true
        parentName:
          type: string
        parentContact:
          type: string
        mealCompletionRate:
          type: number
        inKetoStatus:
          type: boolean
          description: Whether the child's avg carb intake (last 7 days) is within the prescribed daily carb limit
        last24hCompletionRate:
          type: number
          description: Most recent meal day completion rate (0-1)
        currentWeight:
          type: number
        lastWeightDate:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        hasSideEffects:
          type: boolean
          description: Whether the child has any side effects recorded
        sideEffectNames:
          type: array
          description: Names of the side effects recorded for the child (standard or custom)
          items:
            type: string
      required:
        - id
        - name
        - kidCode
        - dateOfBirth
        - ageMonths
        - dietType
        - parentName
        - parentContact
        - mealCompletionRate
        - inKetoStatus
        - last24hCompletionRate
        - hasSideEffects
        - sideEffectNames

    KidProfile:
      type: object
      properties:
        kid:
          $ref: "#/components/schemas/Kid"
        medical:
          $ref: "#/components/schemas/MedicalSettings"
        recentWeights:
          type: array
          items:
            $ref: "#/components/schemas/WeightRecord"
        recentMeals:
          type: array
          items:
            $ref: "#/components/schemas/MealDay"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required:
        - kid
        - medical
        - recentWeights
        - recentMeals
        - notes

    CreateKidRequest:
      type: object
      properties:
        name:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        parentName:
          type: string
        parentContact:
          type: string
        dietType:
          type: string
          enum: [classic, mad, mct, lowgi]
        dietSubCategory:
          type: string
          enum: ["2:1", "2.5:1", "3:1", "3.5:1", "4:1"]
          nullable: true
        kidCode:
          type: string
          description: Patient Health Number (PHN) in format XXXX-XXXXXX-X (e.g. 0180-498827-2). Must be unique.
          pattern: "^\\d{4}-\\d{6}-\\d$"
          example: 0180-498827-2
      required:
        - name
        - dateOfBirth
        - gender
        - parentName
        - parentContact
        - dietType
        - kidCode

    UpdateKidRequest:
      type: object
      properties:
        name:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female]
        parentName:
          type: string
        parentContact:
          type: string
        dietType:
          type: string
          enum: [classic, mad, mct, lowgi]
        dietSubCategory:
          type: string
          enum: ["2:1", "2.5:1", "3:1", "3.5:1", "4:1"]
          nullable: true

    WeightRecord:
      type: object
      properties:
        id:
          type: integer
        kidId:
          type: integer
        weight:
          type: number
        date:
          type: string
          format: date
        note:
          type: string
      required:
        - id
        - kidId
        - weight
        - date

    WeightRecordResponse:
      type: object
      properties:
        id:
          type: integer
        kidId:
          type: integer
        weight:
          type: number
        date:
          type: string
          format: date
        note:
          type: string
        macrosRecalculated:
          type: boolean
          description: Whether macros were auto-recalculated from the new weight
      required:
        - id
        - kidId
        - weight
        - date
        - macrosRecalculated

    WeightRecordRequest:
      type: object
      properties:
        weight:
          type: number
        date:
          type: string
          format: date
        note:
          type: string
      required:
        - weight
        - date

    MedicalSettings:
      type: object
      properties:
        id:
          type: integer
        kidId:
          type: integer
        dietType:
          type: string
          enum: [classic, mad, mct, lowgi]
        dietSubCategory:
          type: string
          enum: ["2:1", "2.5:1", "3:1", "3.5:1", "4:1"]
          nullable: true
        ketoRatio:
          type: number
          description: Ratio of fat to protein + carbohydrates
        dailyCalories:
          type: number
        dailyCarbs:
          type: number
        dailyFat:
          type: number
        dailyProtein:
          type: number
        showAllFoods:
          type: boolean
        showAllRecipes:
          type: boolean
      required:
        - id
        - kidId
        - dietType
        - ketoRatio
        - dailyCalories
        - dailyCarbs
        - dailyFat
        - dailyProtein
        - showAllFoods
        - showAllRecipes

    MedicalSettingsRequest:
      type: object
      properties:
        dietType:
