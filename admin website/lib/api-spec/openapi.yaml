openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Keto Diet Doctor Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Doctor dashboard stats
  - name: kids
    description: Kid management
  - name: foods
    description: Food management
  - name: notes
    description: Private notes
  - name: mealplans
    description: Library meal plan management and assignment
  - name: tokens
    description: Parent access token management
  - name: recipes
    description: Doctor recipe library management
  - name: users
    description: User management (admin only)
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: mealtypes
    description: Meal type management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: doctorLogin
      tags: [auth]
      summary: Doctor login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: doctorLogout
      tags: [auth]
      summary: Doctor logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged in doctor
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    put:
      operationId: updateDoctorProfile
      tags: [auth]
      summary: Update doctor profile (name, email, designation, username)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDoctorProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/force-change:
    put:
      operationId: forceChangePassword
      tags: [auth]
      summary: Force password change (first login — no current password required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForceChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password:
    put:
      operationId: changeDoctorPassword
      tags: [auth]
      summary: Change doctor password (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeDoctorPasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error or wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent clinical activity feed
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentActivityItem"

  /kids:
    get:
      operationId: getKids
      tags: [kids]
      summary: Get all kids with optional search and filter
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, kid ID, parent name
        - name: dietType
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              enum: [classic, mad, mct, lowgi]
          description: Filter by diet type (supports multiple values)
        - name: ketoStatus
          in: query
          schema:
            type: boolean
          description: Filter by keto status (true = in keto, false = not in keto)
      responses:
        "200":
          description: List of kids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kid"

    post:
      operationId: createKid
      tags: [kids]
      summary: Create a new kid profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKidRequest"
      responses:
        "201":
          description: Kid created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kid"

  /kids/{kidId}:
    get:
      operationId: getKid
      tags: [kids]
      summary: Get kid profile
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kid profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KidProfile"
        "404":
          description: Kid not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateKid
      tags: [kids]
      summary: Update kid information
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKidRequest"
      responses:
        "200":
          description: Kid updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kid"

    delete:
      operationId: deleteKid
      tags: [kids]
      summary: Delete a kid and all associated data
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Kid deleted
        "404":
          description: Kid not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kids/{kidId}/weight:
    post:
      operationId: addWeightRecord
      tags: [kids]
      summary: Add weight record for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeightRecordRequest"
      responses:
        "201":
          description: Weight record added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightRecordResponse"

    get:
      operationId: getWeightHistory
      tags: [kids]
      summary: Get weight history for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weight history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightRecord"

  /kids/{kidId}/weight/{recordId}:
    delete:
      operationId: deleteWeightRecord
      tags: [kids]
      summary: Delete a weight record
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weight record deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/medical:
    get:
      operationId: getKidMedical
      tags: [kids]
      summary: Get kid medical settings
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medical settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalSettings"

    put:
      operationId: updateKidMedical
      tags: [kids]
      summary: Update kid medical settings
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicalSettingsRequest"
      responses:
        "200":
          description: Medical settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalSettings"

  /kids/{kidId}/meal-history:
    get:
      operationId: getKidMealHistory
      tags: [kids]
      summary: Get meal history for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Meal history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealDay"

  /kids/{kidId}/notes:
    get:
      operationId: getKidNotes
      tags: [notes]
      summary: Get private notes for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Private notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

    post:
      operationId: addKidNote
      tags: [notes]
      summary: Add a private note for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteRequest"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /kids/{kidId}/notes/{noteId}:
    delete:
      operationId: deleteKidNote
      tags: [notes]
      summary: Delete a private note
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/visibility:
    put:
      operationId: updateFoodVisibility
      tags: [kids]
      summary: Update food/recipe visibility for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisibilityRequest"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/meal-logs:
    get:
      operationId: getKidMealLogs
      tags: [kids]
      summary: Get per-meal log entries for a kid (optionally filtered by date)
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Meal log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealLog"
    post:
      operationId: addMealLog
      tags: [kids]
      summary: Log a per-meal entry for a kid
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMealLogRequest"
      responses:
        "201":
          description: Meal log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"

  /kids/{kidId}/meal-logs/{logId}:
    delete:
      operationId: deleteMealLog
      tags: [kids]
      summary: Delete a meal log entry
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /kids/{kidId}/meal-logs/{logId}/image:
    put:
      operationId: updateMealLogImage
      tags: [kids]
      summary: Set or clear the photo image URL for a meal log entry
      parameters:
        - name: kidId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMealLogImageRequest"
      responses:
        "200":
          description: Image URL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLog"

  /tokens:
    get:
      operationId: listTokens
      tags: [tokens]
      summary: List all parent access tokens for the doctor's kids
      responses:
        "200":
          description: List of tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParentToken"

    post:
      operationId: createToken
      tags: [tokens]
      summary: Generate (or regenerate) a parent access token for a kid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created or regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Child not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tokens/{tokenId}/reset:
    put:
      operationId: resetToken
      tags: [tokens]
      summary: Regenerate a parent token (invalidates old token)
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentToken"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tokens/{tokenId}:
    delete:
      operationId: revokeToken
      tags: [tokens]
      summary: Revoke and delete a parent token
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all recipes for the logged-in doctor
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeDetail"

    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a new recipe with ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipeRequest"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{recipeId}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get a single recipe with ingredients
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDetail"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a recipe and replace its ingredients
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipeRequest"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeDetail"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a recipe and all its ingredients
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{recipeId}/ingredients:
    post:
      operationId: addRecipeIngredient
      tags: [recipes]
      summary: Add an ingredient to a recipe
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeIngredientRequest"
      responses:
        "201":
          description: Ingredient added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeIngredient"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{recipeId}/ingredients/{ingId}:
    delete:
      operationId: deleteRecipeIngredient
      tags: [recipes]
      summary: Remove an ingredient from a recipe
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
        - name: ingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ingredient removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Recipe or ingredient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /meal-types:
    get:
      operationId: listMealTypes
      tags: [mealtypes]
      summary: List all meal types
      responses:
        "200":
          description: List of meal types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealTypeItem"

    post:
      operationId: createMealType
      tags: [mealtypes]
      summary: Create a new meal type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealTypeRequest"
      responses:
        "201":
          description: Meal type created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealTypeItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /meal-types/{id}:
    put:
      operationId: updateMealType
      tags: [mealtypes]
      summary: Update a meal type name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealTypeRequest"
      responses:
        "200":
          description: Meal type updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealTypeItem"
        "404":
          description: Meal type not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteMealType
      tags: [mealtypes]
      summary: Delete a meal type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meal type deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Meal type not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

